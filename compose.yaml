# Both services use the same locally-built image (build123d :with_yacv +
# our mk layer). They differ only in entrypoint: cad runs the CLI, viewer
# runs yacv-server watching /project/outputs/ for glTF.
#
# Host project directory is set via PROJECT_DIR; defaults to ./project.
# Examples:
#   docker compose run --rm cad init                           # uses ./project
#   PROJECT_DIR=/home/me/cad/robot1 docker compose run --rm cad init
services:
  cad:
    build: .
    image: mk-cad:local
    volumes:
      - ${PROJECT_DIR:-./project}:/project
    entrypoint: ["mk"]
    networks: [internal]

  viewer:
    image: mk-cad:local
    depends_on: [cad]                      # ensures the image is built
    volumes:
      - ${PROJECT_DIR:-./project}:/project
    # Phase 5 finding: yacv 0.9.4 ships as a Python library with no CLI; the
    # rev-2 spec's `yacv-server --watch` doesn't exist upstream. Static
    # http.server + <model-viewer> in mk show's emitted index.html does the
    # job for a prototype. See continue.md §3.
    entrypoint: ["python", "-m", "http.server", "32323", "--directory", "/project/outputs"]
    ports:
      - "32323:32323"
    networks: [internal]

networks:
  internal:
